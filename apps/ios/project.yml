# XcodeGen project definition — the canonical, reproducible project source.
# Regenerate the .xcodeproj with:  make ios-project   (or: xcodegen generate)
#
# Requires XcodeGen (https://github.com/yonatanp/XcodeGen): `brew install xcodegen`.
name: SkyTrace
options:
  bundleIdPrefix: com.example.skytrace
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ja
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""            # set in Xcode / MANUAL_ACTIONS.md
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: NO

configs:
  Debug: debug
  Staging: release
  Release: release

targets:
  SkyTrace:
    type: application
    platform: iOS
    sources:
      - path: SkyTrace
      - path: SkyTrace.storekit
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: SkyTrace/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.example.skytrace
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Staging:
          PRODUCT_BUNDLE_IDENTIFIER: com.example.skytrace.staging
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  SkyTraceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SkyTraceTests
    dependencies:
      - target: SkyTrace
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

  SkyTraceUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SkyTraceUITests
    dependencies:
      - target: SkyTrace
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SkyTrace:
    build:
      targets:
        SkyTrace: all
    run:
      config: Debug
      storeKitConfiguration: SkyTrace.storekit
    test:
      config: Debug
      targets:
        - SkyTraceTests
        - SkyTraceUITests
