name: iOS CI

on:
  push:
    branches: [ main, "claude/**", "uiux/**", "auto-refresh/**", "i18n/**", "agent/**", "release/**" ]
  pull_request:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, Unit, UI & Release (Xcode)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Environment
        run: |
          set -euo pipefail
          xcodebuild -version
          xcodebuild -showsdks
          echo "--- available iOS simulators ---"
          xcrun simctl list devices available | grep -i iphone || true

      - name: Regenerate project (XcodeGen)
        run: |
          set -euo pipefail
          brew install xcodegen
          make ios-project

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -destination 'generic/platform=iOS Simulator' -skipPackagePluginValidation clean build-for-testing

      - name: Select simulator
        id: simulator
        run: |
          set -euo pipefail
          UDID=$(xcrun simctl list devices available -j | python3 -c "import sys,json; d=json.load(sys.stdin); devs=[x for v in d['devices'].values() for x in v if x.get('isAvailable') and 'iPhone' in x.get('name','')]; devs.sort(key=lambda x: (0 if 'Pro' in x.get('name','') else 1, x.get('name',''))); print(devs[0]['udid'] if devs else '')")
          if [ -z "$UDID" ]; then echo 'No iPhone simulator available'; exit 1; fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Booting simulator $UDID"
          xcrun simctl bootstatus "$UDID" -b || true

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" -skipPackagePluginValidation -only-testing:SkyTraceTests test-without-building

      - name: Run critical UI tests
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" -skipPackagePluginValidation -only-testing:SkyTraceUITests/CriticalFlowUITests test-without-building

      - name: Build Release configuration
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -configuration Release -destination 'generic/platform=iOS Simulator' -skipPackagePluginValidation CODE_SIGNING_ALLOWED=NO build
