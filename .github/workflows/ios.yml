name: iOS CI

on:
  push:
    branches: [ main, "claude/**", "uiux/**", "auto-refresh/**", "i18n/**", "agent/**", "release/**" ]
  pull_request:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, Unit, UI & Release (Xcode 26)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select and require Xcode 26+
        run: |
          set -euo pipefail
          XCODE_APP=$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' ! -name '*beta*' ! -name '*Beta*' ! -name '*RC*' | sort | tail -1)
          if [ -z "$XCODE_APP" ]; then
            XCODE_APP=$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort | tail -1)
          fi
          if [ -z "$XCODE_APP" ]; then
            echo "::error::Xcode 26 or newer is not installed on this runner"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          echo "Selecting $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          XCODE_MAJOR=$(xcodebuild -version | awk 'NR==1 { split($2, v, "."); print v[1] }')
          if [ "$XCODE_MAJOR" -lt 26 ]; then
            echo "::error::Expected Xcode 26+, got $(xcodebuild -version | head -1)"
            exit 1
          fi

      - name: Environment
        run: |
          set -euo pipefail
          xcodebuild -version
          xcodebuild -showsdks
          echo "--- available iOS simulators ---"
          xcrun simctl list devices available | grep -i iphone || true

      - name: Regenerate project (XcodeGen)
        run: |
          set -euo pipefail
          brew install xcodegen
          make ios-project

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -destination 'generic/platform=iOS Simulator' -skipPackagePluginValidation clean build-for-testing 2>&1 | tee build-for-testing.log

      - name: Select simulator
        id: simulator
        run: |
          set -euo pipefail
          UDID=$(xcrun simctl list devices available -j | python3 -c "import sys,json; d=json.load(sys.stdin); devs=[x for v in d['devices'].values() for x in v if x.get('isAvailable') and 'iPhone' in x.get('name','')]; devs.sort(key=lambda x: (0 if 'Pro' in x.get('name','') else 1, x.get('name',''))); print(devs[0]['udid'] if devs else '')")
          if [ -z "$UDID" ]; then echo 'No iPhone simulator available'; exit 1; fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Booting simulator $UDID"
          xcrun simctl bootstatus "$UDID" -b || true

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" -skipPackagePluginValidation -only-testing:SkyTraceTests test-without-building 2>&1 | tee unit-tests.log

      - name: Run critical UI tests
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" -skipPackagePluginValidation -only-testing:SkyTraceUITests/CriticalFlowUITests test-without-building 2>&1 | tee ui-tests.log

      - name: Build Release configuration for device
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -configuration Release -destination 'generic/platform=iOS' -skipPackagePluginValidation CODE_SIGNING_ALLOWED=NO build 2>&1 | tee release-build.log

      - name: Upload Xcode diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-diagnostics
          path: |
            *-for-testing.log
            unit-tests.log
            ui-tests.log
            release-build.log
          if-no-files-found: ignore

  second-audit-static:
    name: Deep audit — metadata, source safety & Xcode Analyze
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26+ and regenerate canonical project
        run: |
          set -euo pipefail
          XCODE_APP=$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' ! -name '*beta*' ! -name '*Beta*' ! -name '*RC*' | sort | tail -1)
          if [ -z "$XCODE_APP" ]; then XCODE_APP=$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort | tail -1); fi
          test -n "$XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          brew install xcodegen
          make ios-project
          git diff --exit-code -- apps/ios/SkyTrace.xcodeproj

      - name: Validate metadata, privacy, secrets and source safety
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do plutil -lint "$file"; done < <(find apps/ios -type f \( -name '*.plist' -o -name '*.xcprivacy' \) -print0)
          python3 -m json.tool apps/ios/SkyTrace.storekit >/dev/null
          python3 - <<'PY' 2>&1 | tee source-audit.log
          import json, pathlib, re, sys
          root = pathlib.Path('.')
          catalog = json.loads((root/'apps/ios/SkyTrace/Resources/Localizable.xcstrings').read_text(encoding='utf-8'))
          required = {'ja','en','es','fr','de','pt-PT','zh-Hans','zh-Hant','ko','ar','hi','ru'}
          missing=[]; needs=[]
          for key, entry in catalog.get('strings', {}).items():
              locs=entry.get('localizations', {})
              for locale in required:
                  if locale not in locs: missing.append((key,locale))
                  elif 'needs_review' in json.dumps(locs[locale], ensure_ascii=False): needs.append((key,locale))
          print('CATALOG_KEYS', len(catalog.get('strings', {})))
          print('MISSING_LOCALIZATIONS', len(missing))
          for x in missing[:200]: print('MISSING', *x)
          print('NEEDS_REVIEW_INFORMATIONAL', len(needs))

          dangerous_patterns={
            'fatalError':r'\bfatalError\s*\(', 'preconditionFailure':r'\bpreconditionFailure\s*\(',
            'try!':r'\btry!', 'as!':r'\bas!\s', 'unowned':r'\bunowned\b'
          }
          secret_patterns={
            'OpenAI-style key':r'\bsk-[A-Za-z0-9_-]{20,}',
            'Google API key':r'\bAIza[0-9A-Za-z_-]{30,}',
            'AWS access key':r'\bAKIA[0-9A-Z]{16}\b',
            'Private key':r'-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----',
            'Nonempty apiKey literal':r'\bapiKey\s*=\s*"[^"\n]{8,}"'
          }
          dangerous=[]; secrets=[]; hardcoded=[]; todos=[]; swallowed=[]
          ui=re.compile(r'\b(?:Text|Button|Label|navigationTitle|accessibilityLabel|alert)\s*\(\s*"([^"\\]*(?:\\.[^"\\]*)*)"')
          for path in sorted((root/'apps/ios').rglob('*.swift')):
              text=path.read_text(encoding='utf-8')
              for name,p in dangerous_patterns.items():
                  for m in re.finditer(p,text): dangerous.append((str(path),text.count('\n',0,m.start())+1,name))
              for name,p in secret_patterns.items():
                  for m in re.finditer(p,text): secrets.append((str(path),text.count('\n',0,m.start())+1,name))
              for m in re.finditer(r'\b(?:TODO|FIXME|HACK|XXX)\b', text):
                  todos.append((str(path), text.count('\n',0,m.start())+1, m.group(0)))
              for m in re.finditer(r'\btry\?\s+await\b|\btry\?\s+', text):
                  swallowed.append((str(path), text.count('\n',0,m.start())+1, m.group(0).strip()))
              if 'Tests/' not in str(path) and 'UITests/' not in str(path):
                  for m in ui.finditer(text):
                      raw=m.group(1)
                      if raw and '\\(' not in raw: hardcoded.append((str(path),text.count('\n',0,m.start())+1,m.group(0)[:160]))
          print('DANGEROUS_CONSTRUCTS',len(dangerous))
          for x in dangerous: print('DANGEROUS',*x)
          print('POTENTIAL_SECRETS',len(secrets))
          for x in secrets: print('SECRET',*x)
          print('TODO_FIXME_INFORMATIONAL',len(todos))
          for x in todos[:200]: print('TODO',*x)
          print('TRY_OPTIONAL_INFORMATIONAL',len(swallowed))
          for x in swallowed[:200]: print('TRY_OPTIONAL',*x)
          print('POTENTIAL_HARDCODED_UI',len(hardcoded))
          for x in hardcoded[:300]: print('HARDCODED',*x)
          if missing or dangerous or secrets: sys.exit(1)
          PY

      - name: Xcode Analyze Debug simulator — warnings are errors
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -configuration Debug -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO SWIFT_TREAT_WARNINGS_AS_ERRORS=YES GCC_TREAT_WARNINGS_AS_ERRORS=YES analyze 2>&1 | tee analyze-debug.log

      - name: Xcode Analyze Release device — warnings are errors
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO SWIFT_TREAT_WARNINGS_AS_ERRORS=YES GCC_TREAT_WARNINGS_AS_ERRORS=YES analyze 2>&1 | tee analyze-release.log

      - name: Upload deep static audit logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: second-audit-static
          path: |
            source-audit.log
            analyze-debug.log
            analyze-release.log
          if-no-files-found: ignore

  second-audit-runtime:
    name: Deep audit — iPad, ASan, TSan & UBSan
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26+ and generate project
        run: |
          set -euo pipefail
          XCODE_APP=$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' ! -name '*beta*' ! -name '*Beta*' ! -name '*RC*' | sort | tail -1)
          if [ -z "$XCODE_APP" ]; then XCODE_APP=$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort | tail -1); fi
          test -n "$XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          brew install xcodegen
          make ios-project

      - name: Select iPhone and iPad simulators
        id: simulators
        run: |
          set -euo pipefail
          JSON=$(xcrun simctl list devices available -j)
          IPHONE=$(printf '%s' "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); x=[v for vs in d['devices'].values() for v in vs if v.get('isAvailable') and 'iPhone' in v.get('name','')]; x.sort(key=lambda v:v.get('name','')); print(x[-1]['udid'] if x else '')")
          IPAD=$(printf '%s' "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); x=[v for vs in d['devices'].values() for v in vs if v.get('isAvailable') and 'iPad' in v.get('name','')]; x.sort(key=lambda v:v.get('name','')); print(x[-1]['udid'] if x else '')")
          test -n "$IPHONE"; test -n "$IPAD"
          echo "iphone=$IPHONE" >> "$GITHUB_OUTPUT"
          echo "ipad=$IPAD" >> "$GITHUB_OUTPUT"
          xcrun simctl bootstatus "$IPHONE" -b || true
          xcrun simctl bootstatus "$IPAD" -b || true

      - name: Run unit and critical UI tests on iPad
        id: ipad_tests
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -destination "platform=iOS Simulator,id=${{ steps.simulators.outputs.ipad }}" -skipPackagePluginValidation -only-testing:SkyTraceTests -only-testing:SkyTraceUITests/CriticalFlowUITests test 2>&1 | tee ipad-tests.log

      - name: Run unit tests with Address Sanitizer
        id: asan_tests
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -destination "platform=iOS Simulator,id=${{ steps.simulators.outputs.iphone }}" -skipPackagePluginValidation -only-testing:SkyTraceTests -enableAddressSanitizer YES test 2>&1 | tee asan-tests.log

      - name: Run unit tests with Thread Sanitizer
        id: tsan_tests
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -destination "platform=iOS Simulator,id=${{ steps.simulators.outputs.iphone }}" -skipPackagePluginValidation -only-testing:SkyTraceTests -enableThreadSanitizer YES test 2>&1 | tee tsan-tests.log

      - name: Run unit tests with Undefined Behavior Sanitizer
        id: ubsan_tests
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -destination "platform=iOS Simulator,id=${{ steps.simulators.outputs.iphone }}" -skipPackagePluginValidation -only-testing:SkyTraceTests -enableUndefinedBehaviorSanitizer YES test 2>&1 | tee ubsan-tests.log

      - name: Enforce all runtime audit results
        if: always()
        run: |
          echo "iPad: ${{ steps.ipad_tests.outcome }}"
          echo "ASan: ${{ steps.asan_tests.outcome }}"
          echo "TSan: ${{ steps.tsan_tests.outcome }}"
          echo "UBSan: ${{ steps.ubsan_tests.outcome }}"
          test "${{ steps.ipad_tests.outcome }}" = success
          test "${{ steps.asan_tests.outcome }}" = success
          test "${{ steps.tsan_tests.outcome }}" = success
          test "${{ steps.ubsan_tests.outcome }}" = success

      - name: Upload second-audit runtime logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: second-audit-runtime
          path: |
            ipad-tests.log
            asan-tests.log
            tsan-tests.log
            ubsan-tests.log
          if-no-files-found: ignore
