name: iOS CI

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:

jobs:
  build-test:
    name: Build & Test (Xcode)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || echo "Xcode 26 not available on this runner image; using default"

      - name: Regenerate project
        run: |
          brew install xcodegen || true
          make ios-project

      - name: Build & test
        run: |
          xcodebuild \
            -project apps/ios/SkyTrace.xcodeproj \
            -scheme SkyTrace \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            clean test | xcpretty || xcodebuild \
            -project apps/ios/SkyTrace.xcodeproj \
            -scheme SkyTrace \
            -destination 'platform=iOS Simulator,name=iPhone 16' test
