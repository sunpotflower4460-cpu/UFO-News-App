name: Release Readiness

on:
  pull_request:
  push:
    branches: [main, "agent/**", "release/**"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      strict:
        description: "Fail until every App Store gate is complete"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate readiness report
        run: python3 scripts/release_readiness.py --report release-readiness.md

      - name: Upload readiness report
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness
          path: release-readiness.md

      - name: Enforce release gates
        if: startsWith(github.ref, 'refs/tags/v') || inputs.strict == true
        run: python3 scripts/release_readiness.py --strict

  second-audit-xcode-analyze:
    name: Second audit — Xcode Analyze Debug & Release
    runs-on: macos-15
    if: github.head_ref == 'agent/second-deep-audit' || github.ref_name == 'agent/second-deep-audit'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/second-deep-audit

      - name: Select Xcode 26 and regenerate project
        run: |
          set -euo pipefail
          XCODE_APP=$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' ! -name '*beta*' ! -name '*Beta*' ! -name '*RC*' | sort | tail -1)
          if [ -z "$XCODE_APP" ]; then XCODE_APP=$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort | tail -1); fi
          test -n "$XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          brew install xcodegen
          make ios-project
          git diff -- apps/ios/SkyTrace.xcodeproj > xcodegen-project.diff || true
          cp apps/ios/SkyTrace.xcodeproj/project.pbxproj generated-project.pbxproj

      - name: Commit canonical generated project when needed
        run: |
          if git diff --quiet -- apps/ios/SkyTrace.xcodeproj; then
            echo "Canonical project is already synchronized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/ios/SkyTrace.xcodeproj
          git commit -m "Regenerate canonical Xcode project"
          git push origin HEAD:agent/second-deep-audit

      - name: Upload canonical generated project
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-xcodegen-project
          path: |
            generated-project.pbxproj
            xcodegen-project.diff
          if-no-files-found: ignore

      - name: Analyze Debug simulator
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -configuration Debug -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO analyze 2>&1 | tee analyze-debug.log

      - name: Analyze Release device
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO analyze 2>&1 | tee analyze-release.log

      - name: Upload analyzer logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: second-audit-xcode-analyze
          path: analyze-*.log
          if-no-files-found: ignore
