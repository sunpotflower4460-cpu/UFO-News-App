name: Sync generated Xcode project once

on:
  push:
    branches: [agent/app-store-auto-hardening]
    paths:
      - "apps/ios/project.yml"
      - ".github/workflows/sync-generated-xcodeproj-once.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/app-store-auto-hardening

      - name: Generate canonical project
        run: |
          brew install xcodegen
          make ios-project

      - name: Commit generated project when changed
        run: |
          if git diff --quiet -- apps/ios/SkyTrace.xcodeproj; then
            echo "Generated project is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/ios/SkyTrace.xcodeproj
          git commit -m "Sync generated Xcode project"
          git push origin HEAD:agent/app-store-auto-hardening
