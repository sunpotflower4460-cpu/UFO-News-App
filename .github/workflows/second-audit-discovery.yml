name: Second Audit Run Discovery

on:
  push:
    branches: [agent/second-deep-audit]

permissions:
  actions: read
  issues: write
  contents: read

jobs:
  report-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Report workflow run identifiers to PR 17
        uses: actions/github-script@v7
        with:
          script: |
            await new Promise(resolve => setTimeout(resolve, 15000));
            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: context.sha,
              per_page: 100
            });
            const lines = data.workflow_runs
              .map(run => `- ${run.name}: run ${run.id} — ${run.status}/${run.conclusion ?? 'pending'} — ${run.html_url}`)
              .join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 17,
              body: `Second-audit workflow runs for \`${context.sha}\`:\n${lines}`
            });
