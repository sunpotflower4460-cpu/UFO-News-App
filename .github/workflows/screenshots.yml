name: Screenshots

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/screenshot-trigger'

permissions:
  contents: write

jobs:
  capture:
    name: Capture V2 screenshots
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Regenerate project (XcodeGen)
        run: |
          set -euo pipefail
          brew install xcodegen
          make ios-project

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -destination 'generic/platform=iOS Simulator' -skipPackagePluginValidation clean build-for-testing

      - name: Run screenshot UI test
        run: |
          set -o pipefail
          UDID=$(xcrun simctl list devices available -j | python3 -c "import sys,json; d=json.load(sys.stdin); devs=[x for v in d['devices'].values() for x in v if x.get('isAvailable') and 'iPhone' in x.get('name','')]; print(devs[0]['udid'] if devs else '')")
          if [ -z "$UDID" ]; then echo 'No iPhone simulator'; exit 1; fi
          xcrun simctl bootstatus "$UDID" -b || true
          rm -rf Result.xcresult
          xcodebuild -project apps/ios/SkyTrace.xcodeproj -scheme SkyTrace -destination "platform=iOS Simulator,id=$UDID" -skipPackagePluginValidation -only-testing:SkyTraceUITests/ScreenshotUITests -resultBundlePath Result.xcresult test-without-building

      - name: Export attachments
        run: |
          set -o pipefail
          rm -rf shots && mkdir -p shots docs/uiux/screenshots
          xcrun xcresulttool export attachments --path Result.xcresult --output-path shots
          python3 scripts/rename_screenshots.py shots docs/uiux/screenshots
          ls -la docs/uiux/screenshots

      - name: Commit screenshots
        run: |
          set -o pipefail
          git config user.name "SkyTrace CI"
          git config user.email "ci@users.noreply.github.com"
          git add docs/uiux/screenshots
          if git diff --cached --quiet; then
            echo "No screenshot changes"
          else
            git commit -m "chore(screenshots): capture V2 app screens [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
